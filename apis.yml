aid: postmark
name: Postmark
description: Postmark is an email delivery service that helps businesses send and track transactional and broadcast email
  reliably, replacing SMTP with a scalable service that surfaces detailed delivery analytics, bounce tracking, open and click
  tracking, and dedicated IP addresses.
