naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Emailclients
  description: 'Postmark API — Emailclients. 1 operations. Lead operation: Postmark Get email client usage. Self-contained
    Naftiko capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Emailclients
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-emailclients
    baseUri: http://{{baseurl}}
    description: Postmark API — Emailclients business capability. Self-contained, no shared references.
    resources:
    - name: stats-outbound-opens-emailclients
      path: /stats/outbound/opens/emailclients
      operations:
      - name: get
        method: GET
        description: Postmark Get email client usage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tag
          in: query
          type: string
          description: Filter by tag
        - name: fromdate
          in: query
          type: string
          description: Filter messages starting from the date specified. e.g. `2014-02-01`
        - name: todate
          in: query
          type: string
          description: Filter messages up to the date specified. e.g. `2014-02-01`
  exposes:
  - type: rest
    namespace: postmark-emailclients-rest
    port: 8080
    description: REST adapter for Postmark API — Emailclients. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/stats/outbound/opens/emailclients
      name: stats-outbound-opens-emailclients
      description: REST surface for stats-outbound-opens-emailclients.
      operations:
      - method: GET
        name: get
        description: Postmark Get email client usage
        call: postmark-emailclients.get
        with:
          tag: rest.tag
          fromdate: rest.fromdate
          todate: rest.todate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-emailclients-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Emailclients. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: postmark-get-email-client-usage
      description: Postmark Get email client usage
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postmark-emailclients.get
      with:
        tag: tools.tag
        fromdate: tools.fromdate
        todate: tools.todate
      outputParameters:
      - type: object
        mapping: $.
