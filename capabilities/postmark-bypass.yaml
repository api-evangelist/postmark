naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Bypass
  description: 'Postmark API — Bypass. 1 operations. Lead operation: Postmark Bypass rules for a blocked inbound message.
    Self-contained Naftiko capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Bypass
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-bypass
    baseUri: http://{{baseurl}}
    description: Postmark API — Bypass business capability. Self-contained, no shared references.
    resources:
    - name: messages-inbound-messageid-bypass
      path: /messages/inbound/{messageid}/bypass
      operations:
      - name: put
        method: PUT
        description: Postmark Bypass rules for a blocked inbound message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: messageid
          in: path
          type: string
          description: The ID of the message which should bypass inbound rules.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: postmark-bypass-rest
    port: 8080
    description: REST adapter for Postmark API — Bypass. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/messages/inbound/{messageid}/bypass
      name: messages-inbound-messageid-bypass
      description: REST surface for messages-inbound-messageid-bypass.
      operations:
      - method: PUT
        name: put
        description: Postmark Bypass rules for a blocked inbound message
        call: postmark-bypass.put
        with:
          messageid: rest.messageid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-bypass-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Bypass. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: postmark-bypass-rules-blocked-inbound
      description: Postmark Bypass rules for a blocked inbound message
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: postmark-bypass.put
      with:
        messageid: tools.messageid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
