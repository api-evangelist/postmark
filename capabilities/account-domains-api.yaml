    namespace: account-domains-api
    baseUri: ''
    description: Postmark Account API — Domains API business capability. Self-contained, no shared references.
    resources:
    - name: domains
      path: /domains
      operations:
      - name: listdomains
        method: GET
        description: Postmark List Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: count
          in: query
          type: integer
          description: Number of records to return per request. Max 500.
          required: true
        - name: offset
          in: query
          type: integer
          description: Number of records to skip
          required: true
      - name: createdomain
        method: POST
        description: Postmark Create a Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: domains-domainid
      path: /domains/{domainid}
      operations:
      - name: getdomain
        method: GET
        description: Postmark Get a Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: domainid
          in: path
          type: integer
          description: The ID for the Domain that should be retrieved.
          required: true
      - name: editdomain
        method: PUT
        description: Postmark Update a Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: domainid
          in: path
          type: integer
          description: The ID for the Domain that should be modified by the request.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletedomain
        method: DELETE
        description: Postmark Delete a Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: domainid
          in: path
          type: integer
          description: The ID for the Domain that should be deleted by the request.
          required: true
