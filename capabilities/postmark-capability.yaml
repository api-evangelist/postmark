naftiko: 1.0.0-alpha2
info:
  label: Postmark Account API
  description: Postmark makes sending and receiving email incredibly easy. The Account-level API allows users to configure
    all Servers, Domains, and Sender Signatures associated with an Account.
  tags:
  - Postmark
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: postmark
    baseUri: //api.postmarkapp.com
    description: Postmark Account API HTTP API.
    resources:
    - name: servers-serverid
      path: /servers/{serverid}
      operations:
      - name: getserverinformation
        method: GET
        description: Postmark Get a Server
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          required: true
          description: The token associated with the Account on which this request will operate.
        - name: serverid
          in: path
          type: integer
          required: true
          description: The ID of the Server to get.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: editserverinformation
        method: PUT
        description: Postmark Edit a Server
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          required: true
          description: The token associated with the Account on which this request will operate.
        - name: serverid
          in: path
          type: integer
          required: true
          description: The ID of the Server to update.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteserver
        method: DELETE
        description: Postmark Delete a Server
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          required: true
          description: The token associated with the Account on which this request will operate.
        - name: serverid
          in: path
          type: integer
          required: true
          description: The ID of the Server that should be deleted.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: servers
      path: /servers
      operations:
      - name: listservers
        method: GET
        description: Postmark List servers
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          required: true
          description: The token associated with the Account on which this request will operate.
        - name: count
          in: query
          type: integer
          required: true
          description: Number of servers to return per request.
        - name: offset
          in: query
          type: integer
          required: true
          description: Number of servers to skip.
        - name: name
          in: query
          type: string
          description: Filter by a specific server name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createserver
        method: POST
        description: Postmark Create a Server
        inputParameters:
        - name: X-Postmark-Account-Token
