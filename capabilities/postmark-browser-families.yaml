naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Browser Families
  description: 'Postmark API — Browser Families. 1 operations. Lead operation: Postmark Get browser usage by family. Self-contained
    Naftiko capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Browser Families
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-browser-families
    baseUri: http://{{baseurl}}
    description: Postmark API — Browser Families business capability. Self-contained, no shared references.
    resources:
    - name: stats-outbound-clicks-browserfamilies
      path: /stats/outbound/clicks/browserfamilies
      operations:
      - name: get
        method: GET
        description: Postmark Get browser usage by family
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tag
          in: query
          type: string
          description: Filter by tag
        - name: fromdate
          in: query
          type: string
          description: Filter messages starting from the date specified. e.g. `2014-02-01`
        - name: todate
          in: query
          type: string
          description: Filter messages up to the date specified. e.g. `2014-02-01`
  exposes:
  - type: rest
    namespace: postmark-browser-families-rest
    port: 8080
    description: REST adapter for Postmark API — Browser Families. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/stats/outbound/clicks/browserfamilies
      name: stats-outbound-clicks-browserfamilies
      description: REST surface for stats-outbound-clicks-browserfamilies.
      operations:
      - method: GET
        name: get
        description: Postmark Get browser usage by family
        call: postmark-browser-families.get
        with:
          tag: rest.tag
          fromdate: rest.fromdate
          todate: rest.todate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-browser-families-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Browser Families. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: postmark-get-browser-usage-family
      description: Postmark Get browser usage by family
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postmark-browser-families.get
      with:
        tag: tools.tag
        fromdate: tools.fromdate
        todate: tools.todate
      outputParameters:
      - type: object
        mapping: $.
