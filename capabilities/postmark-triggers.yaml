naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Triggers
  description: 'Postmark API — Triggers. 4 operations. Lead operation: Postmark List inbound rule triggers. Self-contained
    Naftiko capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Triggers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-triggers
    baseUri: http://{{baseurl}}
    description: Postmark API — Triggers business capability. Self-contained, no shared references.
    resources:
    - name: triggers-inboundrules
      path: /triggers/inboundrules
      operations:
      - name: get
        method: GET
        description: Postmark List inbound rule triggers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: count
          in: query
          type: string
          description: Number of bounces to return per request. Max 500.
        - name: offset
          in: query
          type: string
          description: Number of bounces to skip.
    - name: triggers-inboundrules-triggerid
      path: /triggers/inboundrules/{triggerid}
      operations:
      - name: delete
        method: DELETE
        description: Postmark Delete a single trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: triggerid
          in: path
          type: string
          description: The ID of the Inbound Rule that should be deleted.
          required: true
    - name: triggers-tags
      path: /triggers/tags
      operations:
      - name: get
        method: GET
        description: Postmark Search triggers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: count
          in: query
          type: string
          description: Number of bounces to return per request. Max 500.
        - name: offset
          in: query
          type: string
          description: Number of bounces to skip.
        - name: match_name
          in: query
          type: string
          description: Filter by delivery tag
    - name: triggers-tags-triggerid
      path: /triggers/tags/{triggerid}
      operations:
      - name: delete
        method: DELETE
        description: Postmark Delete a single trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: triggerid
          in: path
          type: string
          description: The ID of the Inbound Rule that should be deleted.
          required: true
  exposes:
  - type: rest
    namespace: postmark-triggers-rest
    port: 8080
    description: REST adapter for Postmark API — Triggers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/triggers/inboundrules
      name: triggers-inboundrules
      description: REST surface for triggers-inboundrules.
      operations:
      - method: GET
        name: get
        description: Postmark List inbound rule triggers
        call: postmark-triggers.get
        with:
          count: rest.count
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/triggers/inboundrules/{triggerid}
      name: triggers-inboundrules-triggerid
      description: REST surface for triggers-inboundrules-triggerid.
      operations:
      - method: DELETE
        name: delete
        description: Postmark Delete a single trigger
        call: postmark-triggers.delete
        with:
          triggerid: rest.triggerid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/triggers/tags
      name: triggers-tags
      description: REST surface for triggers-tags.
      operations:
      - method: GET
        name: get
        description: Postmark Search triggers
        call: postmark-triggers.get
        with:
          count: rest.count
          offset: rest.offset
          match_name: rest.match_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/triggers/tags/{triggerid}
      name: triggers-tags-triggerid
      description: REST surface for triggers-tags-triggerid.
      operations:
      - method: DELETE
        name: delete
        description: Postmark Delete a single trigger
        call: postmark-triggers.delete
        with:
          triggerid: rest.triggerid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-triggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Triggers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: postmark-list-inbound-rule-triggers
      description: Postmark List inbound rule triggers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postmark-triggers.get
      with:
        count: tools.count
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: postmark-delete-single-trigger
      description: Postmark Delete a single trigger
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: postmark-triggers.delete
      with:
        triggerid: tools.triggerid
      outputParameters:
      - type: object
        mapping: $.
    - name: postmark-search-triggers
      description: Postmark Search triggers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postmark-triggers.get
      with:
        count: tools.count
        offset: tools.offset
        match_name: tools.match_name
      outputParameters:
      - type: object
        mapping: $.
    - name: postmark-delete-single-trigger-2
      description: Postmark Delete a single trigger
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: postmark-triggers.delete
      with:
        triggerid: tools.triggerid
      outputParameters:
      - type: object
        mapping: $.
