naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Stats/Outbound
  description: 'Postmark API — Stats/Outbound. 2 operations. Lead operation: Postmark Get bounce counts. Self-contained Naftiko
    capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Stats/Outbound
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-stats-outbound
    baseUri: http://{{baseurl}}
    description: Postmark API — Stats/Outbound business capability. Self-contained, no shared references.
    resources:
    - name: stats-outbound-bounces
      path: /stats/outbound/bounces
      operations:
      - name: get
        method: GET
        description: Postmark Get bounce counts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tag
          in: query
          type: string
          description: Filter by tag
        - name: fromdate
          in: query
          type: string
          description: Filter messages starting from the date specified. e.g. `2014-02-01`
        - name: todate
          in: query
          type: string
          description: Filter messages up to the date specified. e.g. `2014-02-01`
    - name: stats-outbound-tracked
      path: /stats/outbound/tracked
      operations:
      - name: get
        method: GET
        description: Postmark Get tracked email counts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tag
          in: query
          type: string
          description: Filter by tag
        - name: fromdate
          in: query
          type: string
          description: Filter messages starting from the date specified. e.g. `2014-02-01`
        - name: todate
          in: query
          type: string
          description: Filter messages up to the date specified. e.g. `2014-02-01`
  exposes:
  - type: rest
    namespace: postmark-stats-outbound-rest
    port: 8080
    description: REST adapter for Postmark API — Stats/Outbound. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/stats/outbound/bounces
      name: stats-outbound-bounces
      description: REST surface for stats-outbound-bounces.
      operations:
      - method: GET
        name: get
        description: Postmark Get bounce counts
        call: postmark-stats-outbound.get
        with:
          tag: rest.tag
          fromdate: rest.fromdate
          todate: rest.todate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stats/outbound/tracked
      name: stats-outbound-tracked
      description: REST surface for stats-outbound-tracked.
      operations:
      - method: GET
        name: get
        description: Postmark Get tracked email counts
        call: postmark-stats-outbound.get
        with:
          tag: rest.tag
          fromdate: rest.fromdate
          todate: rest.todate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-stats-outbound-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Stats/Outbound. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: postmark-get-bounce-counts
      description: Postmark Get bounce counts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postmark-stats-outbound.get
      with:
        tag: tools.tag
        fromdate: tools.fromdate
        todate: tools.todate
      outputParameters:
      - type: object
        mapping: $.
    - name: postmark-get-tracked-email-counts
      description: Postmark Get tracked email counts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postmark-stats-outbound.get
      with:
        tag: tools.tag
        fromdate: tools.fromdate
        todate: tools.todate
      outputParameters:
      - type: object
        mapping: $.
