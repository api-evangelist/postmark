naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Retry
  description: 'Postmark API — Retry. 1 operations. Lead operation: Postmark Retry a failed inbound message for processing.
    Self-contained Naftiko capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Retry
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-retry
    baseUri: http://{{baseurl}}
    description: Postmark API — Retry business capability. Self-contained, no shared references.
    resources:
    - name: messages-inbound-messageid-retry
      path: /messages/inbound/{messageid}/retry
      operations:
      - name: put
        method: PUT
        description: Postmark Retry a failed inbound message for processing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: messageid
          in: path
          type: string
          description: The ID of the message which should bypass inbound rules.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: postmark-retry-rest
    port: 8080
    description: REST adapter for Postmark API — Retry. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/messages/inbound/{messageid}/retry
      name: messages-inbound-messageid-retry
      description: REST surface for messages-inbound-messageid-retry.
      operations:
      - method: PUT
        name: put
        description: Postmark Retry a failed inbound message for processing
        call: postmark-retry.put
        with:
          messageid: rest.messageid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-retry-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Retry. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: postmark-retry-failed-inbound-message
      description: Postmark Retry a failed inbound message for processing
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: postmark-retry.put
      with:
        messageid: tools.messageid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
