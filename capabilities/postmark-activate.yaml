naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Activate
  description: 'Postmark API — Activate. 1 operations. Lead operation: Postmark Activate a bounce. Self-contained Naftiko
    capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Activate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-activate
    baseUri: http://{{baseurl}}
    description: Postmark API — Activate business capability. Self-contained, no shared references.
    resources:
    - name: bounces-bounceid-activate
      path: /bounces/{bounceid}/activate
      operations:
      - name: put
        method: PUT
        description: Postmark Activate a bounce
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bounceid
          in: path
          type: string
          description: The ID of the bounce to retrieve.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: postmark-activate-rest
    port: 8080
    description: REST adapter for Postmark API — Activate. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/bounces/{bounceid}/activate
      name: bounces-bounceid-activate
      description: REST surface for bounces-bounceid-activate.
      operations:
      - method: PUT
        name: put
        description: Postmark Activate a bounce
        call: postmark-activate.put
        with:
          bounceid: rest.bounceid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-activate-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Activate. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: postmark-activate-bounce
      description: Postmark Activate a bounce
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: postmark-activate.put
      with:
        bounceid: tools.bounceid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
