naftiko: 1.0.0-alpha2
info:
  label: Postmark Account API — Server Management API
  description: 'Postmark Account API — Server Management API. 5 operations. Lead operation: Postmark List servers. Self-contained
    Naftiko capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Server Management API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-server-management-api
    baseUri: ''
    description: Postmark Account API — Server Management API business capability. Self-contained, no shared references.
    resources:
    - name: servers
      path: /servers
      operations:
      - name: listservers
        method: GET
        description: Postmark List servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: count
          in: query
          type: integer
          description: Number of servers to return per request.
          required: true
        - name: offset
          in: query
          type: integer
          description: Number of servers to skip.
          required: true
        - name: name
          in: query
          type: string
          description: Filter by a specific server name
      - name: createserver
        method: POST
        description: Postmark Create a Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: servers-serverid
      path: /servers/{serverid}
      operations:
      - name: getserverinformation
        method: GET
        description: Postmark Get a Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: serverid
          in: path
          type: integer
          description: The ID of the Server to get.
          required: true
      - name: editserverinformation
        method: PUT
        description: Postmark Edit a Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: serverid
          in: path
          type: integer
          description: The ID of the Server to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteserver
        method: DELETE
        description: Postmark Delete a Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Postmark-Account-Token
          in: header
          type: string
          description: The token associated with the Account on which this request will operate.
          required: true
        - name: serverid
          in: path
          type: integer
          description: The ID of the Server that should be deleted.
          required: true
  exposes:
  - type: rest
    namespace: account-server-management-api-rest
    port: 8080
    description: REST adapter for Postmark Account API — Server Management API. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/servers
      name: servers
      description: REST surface for servers.
      operations:
      - method: GET
        name: listservers
        description: Postmark List servers
        call: account-server-management-api.listservers
        with:
          X-Postmark-Account-Token: rest.X-Postmark-Account-Token
          count: rest.count
          offset: rest.offset
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createserver
        description: Postmark Create a Server
        call: account-server-management-api.createserver
        with:
          X-Postmark-Account-Token: rest.X-Postmark-Account-Token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/servers/{serverid}
      name: servers-serverid
      description: REST surface for servers-serverid.
      operations:
      - method: GET
        name: getserverinformation
        description: Postmark Get a Server
        call: account-server-management-api.getserverinformation
        with:
          X-Postmark-Account-Token: rest.X-Postmark-Account-Token
          serverid: rest.serverid
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: editserverinformation
        description: Postmark Edit a Server
        call: account-server-management-api.editserverinformation
        with:
          X-Postmark-Account-Token: rest.X-Postmark-Account-Token
          serverid: rest.serverid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteserver
        description: Postmark Delete a Server
        call: account-server-management-api.deleteserver
        with:
          X-Postmark-Account-Token: rest.X-Postmark-Account-Token
          serverid: rest.serverid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-server-management-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark Account API — Server Management API. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: postmark-list-servers
      description: Postmark List servers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-server-management-api.listservers
      with:
        X-Postmark-Account-Token: tools.X-Postmark-Account-Token
        count: tools.count
        offset: tools.offset
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: postmark-create-server
      description: Postmark Create a Server
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-server-management-api.createserver
      with:
        X-Postmark-Account-Token: tools.X-Postmark-Account-Token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postmark-get-server
      description: Postmark Get a Server
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-server-management-api.getserverinformation
      with:
        X-Postmark-Account-Token: tools.X-Postmark-Account-Token
        serverid: tools.serverid
      outputParameters:
      - type: object
        mapping: $.
    - name: postmark-edit-server
      description: Postmark Edit a Server
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: account-server-management-api.editserverinformation
      with:
        X-Postmark-Account-Token: tools.X-Postmark-Account-Token
        serverid: tools.serverid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: postmark-delete-server
      description: Postmark Delete a Server
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: account-server-management-api.deleteserver
      with:
        X-Postmark-Account-Token: tools.X-Postmark-Account-Token
        serverid: tools.serverid
      outputParameters:
      - type: object
        mapping: $.
