naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Messages > Outbound > Opens
  description: 'Postmark API — Messages > Outbound > Opens. 1 operations. Lead operation: Postmark Opens for all messages.
    Self-contained Naftiko capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Messages > Outbound > Opens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-messages-outbound-opens
    baseUri: http://{{baseurl}}
    description: Postmark API — Messages > Outbound > Opens business capability. Self-contained, no shared references.
    resources:
    - name: messages-outbound-opens
      path: /messages/outbound/opens
      operations:
      - name: get
        method: GET
        description: Postmark Opens for all messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: count
          in: query
          type: string
          description: Number of bounces to return per request. Max 500.
        - name: offset
          in: query
          type: string
          description: Number of bounces to skip.
        - name: recipient
          in: query
          type: string
          description: Filter by the user who was receiving the email
        - name: tag
          in: query
          type: string
          description: Filter by tag
        - name: client_name
          in: query
          type: string
          description: Filter by client name, i.e. Outlook, Gmail
        - name: client_company
          in: query
          type: string
          description: Filter by company, i.e. Microsoft, Apple, Google
        - name: client_family
          in: query
          type: string
          description: Filter by client family, i.e. OS X, Chrome
        - name: os_name
          in: query
          type: string
          description: Filter by full OS name and specific version, i.e. OS X 10.9 Mavericks, Windows 7
        - name: os_family
          in: query
          type: string
          description: Filter by kind of OS used without specific version, i.e. OS X, Windows
        - name: os_company
          in: query
          type: string
          description: Filter by company which produced the OS, i.e. Apple Computer, Inc., Microsoft Corporation
        - name: platform
          in: query
          type: string
          description: Filter by platform, i.e. webmail, desktop, mobile
        - name: country
          in: query
          type: string
          description: Filter by country messages were opened in, i.e. Denmark, Russia
        - name: region
          in: query
          type: string
          description: Filter by full name of region messages were opened in, i.e. Moscow, New York
        - name: city
          in: query
          type: string
          description: Filter by full name of region messages were opened in, i.e. Moscow, New York
  exposes:
  - type: rest
    namespace: postmark-messages-outbound-opens-rest
    port: 8080
    description: REST adapter for Postmark API — Messages > Outbound > Opens. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/messages/outbound/opens
      name: messages-outbound-opens
      description: REST surface for messages-outbound-opens.
      operations:
      - method: GET
        name: get
        description: Postmark Opens for all messages
        call: postmark-messages-outbound-opens.get
        with:
          count: rest.count
          offset: rest.offset
          recipient: rest.recipient
          tag: rest.tag
          client_name: rest.client_name
          client_company: rest.client_company
          client_family: rest.client_family
          os_name: rest.os_name
          os_family: rest.os_family
          os_company: rest.os_company
          platform: rest.platform
          country: rest.country
          region: rest.region
          city: rest.city
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-messages-outbound-opens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Messages > Outbound > Opens. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: postmark-opens-all-messages
      description: Postmark Opens for all messages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postmark-messages-outbound-opens.get
      with:
        count: tools.count
        offset: tools.offset
        recipient: tools.recipient
        tag: tools.tag
        client_name: tools.client_name
        client_company: tools.client_company
        client_family: tools.client_family
        os_name: tools.os_name
        os_family: tools.os_family
        os_company: tools.os_company
        platform: tools.platform
        country: tools.country
        region: tools.region
        city: tools.city
      outputParameters:
      - type: object
        mapping: $.
