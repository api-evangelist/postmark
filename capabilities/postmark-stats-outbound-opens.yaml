naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Stats/Outbound > Opens
  description: 'Postmark API — Stats/Outbound > Opens. 1 operations. Lead operation: Postmark Get email open counts. Self-contained
    Naftiko capability covering one Postmark business surface.'
  tags:
  - Postmark
  - Stats/Outbound > Opens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-stats-outbound-opens
    baseUri: http://{{baseurl}}
    description: Postmark API — Stats/Outbound > Opens business capability. Self-contained, no shared references.
    resources:
    - name: stats-outbound-opens
      path: /stats/outbound/opens
      operations:
      - name: get
        method: GET
        description: Postmark Get email open counts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tag
          in: query
          type: string
          description: Filter by tag
        - name: fromdate
          in: query
          type: string
          description: Filter messages starting from the date specified. e.g. `2014-02-01`
        - name: todate
          in: query
          type: string
          description: Filter messages up to the date specified. e.g. `2014-02-01`
  exposes:
  - type: rest
    namespace: postmark-stats-outbound-opens-rest
    port: 8080
    description: REST adapter for Postmark API — Stats/Outbound > Opens. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/stats/outbound/opens
      name: stats-outbound-opens
      description: REST surface for stats-outbound-opens.
      operations:
      - method: GET
        name: get
        description: Postmark Get email open counts
        call: postmark-stats-outbound-opens.get
        with:
          tag: rest.tag
          fromdate: rest.fromdate
          todate: rest.todate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-stats-outbound-opens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Stats/Outbound > Opens. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: postmark-get-email-open-counts
      description: Postmark Get email open counts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postmark-stats-outbound-opens.get
      with:
        tag: tools.tag
        fromdate: tools.fromdate
        todate: tools.todate
      outputParameters:
      - type: object
        mapping: $.
