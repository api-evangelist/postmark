naftiko: 1.0.0-alpha2
info:
  label: Postmark API — Spam
  description: 'Postmark API — Spam. 1 operations. Lead operation: Postmark Get spam complaints. Self-contained Naftiko capability
    covering one Postmark business surface.'
  tags:
  - Postmark
  - Spam
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POSTMARK_API_KEY: POSTMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: postmark-spam
    baseUri: http://{{baseurl}}
    description: Postmark API — Spam business capability. Self-contained, no shared references.
    resources:
    - name: stats-outbound-spam
      path: /stats/outbound/spam
      operations:
      - name: get
        method: GET
        description: Postmark Get spam complaints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tag
          in: query
          type: string
          description: Filter by tag
        - name: fromdate
          in: query
          type: string
          description: Filter messages starting from the date specified. e.g. `2014-02-01`
        - name: todate
          in: query
          type: string
          description: Filter messages up to the date specified. e.g. `2014-02-01`
  exposes:
  - type: rest
    namespace: postmark-spam-rest
    port: 8080
    description: REST adapter for Postmark API — Spam. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/stats/outbound/spam
      name: stats-outbound-spam
      description: REST surface for stats-outbound-spam.
      operations:
      - method: GET
        name: get
        description: Postmark Get spam complaints
        call: postmark-spam.get
        with:
          tag: rest.tag
          fromdate: rest.fromdate
          todate: rest.todate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: postmark-spam-mcp
    port: 9090
    transport: http
    description: MCP adapter for Postmark API — Spam. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: postmark-get-spam-complaints
      description: Postmark Get spam complaints
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postmark-spam.get
      with:
        tag: tools.tag
        fromdate: tools.fromdate
        todate: tools.todate
      outputParameters:
      - type: object
        mapping: $.
