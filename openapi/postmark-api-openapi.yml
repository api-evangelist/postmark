        - name: recipient
          in: query
          schema:
            type: string
          description: Filter by the user who was receiving the email
          example: <string>
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag
          example: <string>
        - name: client_name
          in: query
          schema:
            type: string
          description: Filter by client name, i.e. Outlook, Gmail
          example: <string>
        - name: client_company
          in: query
          schema:
            type: string
          description: Filter by company, i.e. Microsoft, Apple, Google
          example: <string>
        - name: client_family
          in: query
          schema:
            type: string
          description: Filter by client family, i.e. OS X, Chrome
          example: <string>
        - name: os_name
          in: query
          schema:
            type: string
          description: >-
            Filter by full OS name and specific version, i.e. OS X 10.9
            Mavericks, Windows 7
          example: <string>
        - name: os_family
          in: query
          schema:
            type: string
          description: >-
            Filter by kind of OS used without specific version, i.e. OS X,
            Windows
          example: <string>
        - name: os_company
          in: query
          schema:
            type: string
          description: >-
            Filter by company which produced the OS, i.e. Apple Computer, Inc.,
            Microsoft Corporation
          example: <string>
        - name: platform
          in: query
          schema:
            type: string
          description: Filter by platform, i.e. webmail, desktop, mobile
          example: <string>
        - name: country
          in: query
          schema:
            type: string
          description: Filter by country messages were opened in, i.e. Denmark, Russia
          example: <string>
        - name: region
          in: query
          schema:
            type: string
          description: >-
            Filter by full name of region messages were opened in, i.e. Moscow,
            New York
          example: <string>
        - name: city
          in: query
          schema:
            type: string
          description: >-
            Filter by full name of region messages were opened in, i.e. Moscow,
            New York
          example: <string>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
