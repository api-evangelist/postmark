openapi: 3.0.0
info:
  title: Postmark API
  description: |-
    Postmark helps deliver and track application email. In a nutshell, the
    service replaces SMTP (or Sendmail) with a far more reliable, scalable and
    care-free environment. In addition, you can track statistics such as
    number of emails sent or processed, opens, bounces and spam complaints.
  version: 1.0.0
servers:
  - url: http://{{baseurl}}
tags:
  - name: Activate
  - name: Alias
  - name: Batch
  - name: Bounceid
  - name: Bounces
  - name: Browser Families
  - name: Bypass
  - name: Dump
  - name: Email
  - name: Emailclients
  - name: Inbound
  - name: Locations
  - name: Message Identifier
  - name: Messages
  - name: Messages > Inbound > {Messageid}
  - name: Messages > Outbound > Clicks
  - name: Messages > Outbound > Opens
  - name: Messages > Outbound > {Messageid}
  - name: Outbound
  - name: Platforms
  - name: Readtimes
  - name: Retry
  - name: Sends
  - name: Servers
  - name: Spam
  - name: Statistics
  - name: Stats/Outbound
  - name: Stats/Outbound > Clicks
  - name: Stats/Outbound > Opens
  - name: Template
  - name: Templates
  - name: Triggerid
  - name: Triggers
  - name: Triggers > Inboundrules
  - name: Triggers > Tags
  - name: Validate
paths:
  /bounces/{bounceid}:
    get:
      tags:
        - Bounceid
      summary: Postmark Get a single bounce
      parameters:
        - name: bounceid
          in: path
          schema:
            type: string
          required: true
          description: The ID of the bounce to retrieve.
          example: <integer>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /bounces/{bounceid}/activate:
    put:
      tags:
        - Activate
        - Bounceid
      summary: Postmark Activate a bounce
      requestBody:
        content: {}
      parameters:
        - name: bounceid
          in: path
          schema:
            type: string
          required: true
          description: The ID of the bounce to retrieve.
          example: <integer>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /bounces/{bounceid}/dump:
    get:
      tags:
        - Bounceid
        - Dump
      summary: Postmark Get bounce dump
      parameters:
        - name: bounceid
          in: path
          schema:
            type: string
          required: true
          description: The ID of the bounce to retrieve.
          example: <integer>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /bounces:
    get:
      tags:
        - Bounces
      summary: Postmark Get bounces
      parameters:
        - name: count
          in: query
          schema:
            type: string
          description: Number of bounces to return per request. Max 500.
          example: <integer>
        - name: offset
          in: query
          schema:
            type: string
          description: Number of bounces to skip.
          example: <integer>
        - name: type
          in: query
          schema:
            type: string
          description: Filter by type of bounce
          example: <string>
        - name: inactive
          in: query
          schema:
            type: string
          description: >-
            Filter by emails that were deactivated by Postmark due to the
            bounce. Set to true or false. If this isn't specified it will return
            both active and inactive.
          example: <boolean>
        - name: emailFilter
          in: query
          schema:
            type: string
          description: Filter by email address
          example: <string>
        - name: messageID
          in: query
          schema:
            type: string
          description: Filter by messageID
          example: <string>
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag
          example: <string>
        - name: todate
          in: query
          schema:
            type: string
          description: Filter messages up to the date specified. e.g. `2014-02-01`
          example: <string>
        - name: fromdate
          in: query
          schema:
            type: string
          description: Filter messages starting from the date specified. e.g. `2014-02-01`
          example: <string>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /bounces/tags:
    get:
      tags: []
      summary: Postmark Get bounced tags
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /email:
    post:
      tags:
        - Email
      summary: Postmark Send a single email
      requestBody:
        content: {}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /email/batch:
    post:
      tags:
        - Batch
        - Email
      summary: Postmark Send a batch of emails
      requestBody:
        content: {}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /email/batchWithTemplates:
    post:
      tags:
