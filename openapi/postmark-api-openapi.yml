  /email/withTemplate:
    post:
      tags:
        - Email
        - Template
      summary: Postmark Send an email using a Template
      requestBody:
        content: {}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /messages/inbound/{messageid}/bypass:
    put:
      tags:
        - Bypass
        - Inbound
        - Messages
      summary: Postmark Bypass rules for a blocked inbound message
      requestBody:
        content: {}
      parameters:
        - name: messageid
          in: path
          schema:
            type: string
          required: true
          description: The ID of the message which should bypass inbound rules.
          example: <string>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /messages/inbound/{messageid}/details:
    get:
