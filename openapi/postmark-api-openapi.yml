  /messages/inbound:
    get:
      tags:
        - Inbound
        - Messages
      summary: Postmark Inbound message search
      parameters:
        - name: count
          in: query
          schema:
            type: string
          description: Number of bounces to return per request. Max 500.
          example: <integer>
        - name: offset
          in: query
          schema:
            type: string
          description: Number of bounces to skip.
          example: <integer>
        - name: recipient
          in: query
          schema:
            type: string
          description: Filter by the user who was receiving the email
          example: <string>
        - name: fromemail
          in: query
          schema:
            type: string
          description: Filter by the sender email address
          example: <string>
        - name: subject
          in: query
          schema:
            type: string
          description: Filter by email subject
          example: <string>
        - name: mailboxhash
          in: query
          schema:
            type: string
          description: Filter by mailboxhash
          example: <string>
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag
          example: <string>
        - name: status
          in: query
          schema:
            type: string
          description: >-
            Filter by status (`blocked`, `processed`, `queued`, `failed`,
            `scheduled`)
          example: <string>
        - name: todate
          in: query
          schema:
            type: string
          description: Filter messages up to the date specified. e.g. `2014-02-01`
          example: <string>
        - name: fromdate
          in: query
          schema:
            type: string
          description: Filter messages starting from the date specified. e.g. `2014-02-01`
          example: <string>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /messages/outbound/clicks:
    get:
      tags:
        - Messages
        - Messages > Outbound > Clicks
        - Outbound
      summary: Postmark Clicks for a all messages
      parameters:
        - name: count
